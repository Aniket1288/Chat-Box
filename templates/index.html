<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexusChat 🚀</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #020810;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 200, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 200, 255, 0.035) 1px, transparent 1px);
      background-size: 44px 44px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0, 100, 180, 0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Main container */
    .chat-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
      height: 88vh;
      max-height: 740px;
      display: flex;
      flex-direction: column;
      background: rgba(6, 12, 24, 0.92);
      border: 1px solid rgba(0, 200, 255, 0.14);
      border-radius: 20px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(0, 200, 255, 0.06),
        0 40px 80px rgba(0, 0, 0, 0.7),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    /* Scan line animation */
    .scan-line {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, rgba(0, 200, 255, 0.5) 40%, rgba(0, 200, 255, 0.5) 60%, transparent 100%);
      animation: scan 5s linear infinite;
      z-index: 10;
      pointer-events: none;
    }
    @keyframes scan { 0% { top: 0; opacity: 0; } 5% { opacity: 1; } 95% { opacity: 1; } 100% { top: 100%; opacity: 0; } }

    /* Header */
    .chat-header {
      padding: 16px 22px;
      border-bottom: 1px solid rgba(0, 200, 255, 0.1);
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(6, 12, 24, 0.9);
      backdrop-filter: blur(16px);
      flex-shrink: 0;
    }

    .logo-ring {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, #00c8ff, #7b5ea7, #0050aa, #00c8ff);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: spin 10s linear infinite;
      flex-shrink: 0;
    }
    .logo-inner {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #060c18;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #00c8ff;
      font-size: 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .header-info { flex: 1; }
    .header-title { font-size: 15px; font-weight: 600; color: #e0f4ff; letter-spacing: 0.3px; }
    .header-sub { font-size: 11px; color: #3a6a80; margin-top: 2px; }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid rgba(0, 200, 255, 0.15);
      background: rgba(0, 200, 255, 0.05);
      font-size: 11px;
      color: #00c8ff;
    }
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #00c8ff;
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100% { opacity:1; box-shadow: 0 0 6px rgba(0,200,255,0.8); } 50% { opacity: 0.3; box-shadow: none; } }

    /* Messages */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: rgba(0,200,255,0.15); border-radius: 4px; }

    .msg { display: flex; flex-direction: column; gap: 5px; max-width: 80%; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.bot  { align-self: flex-start; align-items: flex-start; }

    .msg-row { display: flex; align-items: flex-end; gap: 8px; }
    .msg.user .msg-row { flex-direction: row-reverse; }

    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }
    .msg.bot  .msg-avatar { background: rgba(0,200,255,0.1); border: 1px solid rgba(0,200,255,0.2); color: #00c8ff; }
    .msg.user .msg-avatar { background: rgba(123,94,167,0.15); border: 1px solid rgba(123,94,167,0.25); color: #b08fff; }

    .msg-bubble {
      padding: 11px 16px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
      position: relative;
      animation: fadein 0.25s ease;
    }
    @keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .msg.user .msg-bubble {
      background: linear-gradient(135deg, #0a3d5c, #0c2540);
      border: 1px solid rgba(0,200,255,0.2);
      color: #c8e8f8;
      border-bottom-right-radius: 4px;
    }
    .msg.bot .msg-bubble {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: #cce6f2;
      border-bottom-left-radius: 4px;
    }
    .msg-time { font-size: 10px; color: #254a5e; padding: 0 4px; }

    /* Typing indicator */
    .typing-indicator {
      display: none;
      align-self: flex-start;
      align-items: center;
      gap: 5px;
      padding: 12px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      border-bottom-left-radius: 4px;
    }
    .typing-indicator.show { display: flex; }
    .t-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #3a7f9a;
      animation: tdot 1.3s ease-in-out infinite;
    }
    .t-dot:nth-child(2) { animation-delay: 0.18s; }
    .t-dot:nth-child(3) { animation-delay: 0.36s; }
    @keyframes tdot { 0%,80%,100% { transform: translateY(0); opacity: 0.5; } 40% { transform: translateY(-7px); opacity: 1; } }

    /* Input area */
    .chat-input-area {
      padding: 14px 20px 18px;
      border-top: 1px solid rgba(0,200,255,0.08);
      background: rgba(4,9,18,0.95);
      backdrop-filter: blur(16px);
      flex-shrink: 0;
    }

    .input-shell {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(0,200,255,0.14);
      border-radius: 16px;
      padding: 8px 8px 8px 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-shell:focus-within {
      border-color: rgba(0,200,255,0.4);
      box-shadow: 0 0 20px rgba(0,200,255,0.06);
    }

    .chat-textarea {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: #cce6f2;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      resize: none;
      max-height: 110px;
      line-height: 1.55;
      padding: 5px 0;
    }
    .chat-textarea::placeholder { color: #1e4a5e; }

    .send-btn {
      width: 40px;
      height: 40px;
      border-radius: 11px;
      background: linear-gradient(135deg, #00b8e8, #0078aa);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .send-btn:hover {
      transform: scale(1.07);
      box-shadow: 0 4px 16px rgba(0,200,255,0.35);
    }
    .send-btn:active { transform: scale(0.94); }
    .send-btn svg { width: 16px; height: 16px; fill: none; stroke: #fff; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

    .hint-bar {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .hint-pill {
      font-size: 11px;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid rgba(0,200,255,0.12);
      color: #3a7a90;
      cursor: pointer;
      transition: all 0.2s;
      background: rgba(0,200,255,0.03);
      user-select: none;
    }
    .hint-pill:hover {
      border-color: rgba(0,200,255,0.38);
      color: #00c8ff;
      background: rgba(0,200,255,0.07);
    }

    /* Corner accents */
    .corner { position: absolute; width: 16px; height: 16px; }
    .corner-tl { top: 10px; left: 10px; border-top: 1.5px solid rgba(0,200,255,0.4); border-left: 1.5px solid rgba(0,200,255,0.4); }
    .corner-tr { top: 10px; right: 10px; border-top: 1.5px solid rgba(0,200,255,0.4); border-right: 1.5px solid rgba(0,200,255,0.4); }
    .corner-bl { bottom: 10px; left: 10px; border-bottom: 1.5px solid rgba(0,200,255,0.4); border-left: 1.5px solid rgba(0,200,255,0.4); }
    .corner-br { bottom: 10px; right: 10px; border-bottom: 1.5px solid rgba(0,200,255,0.4); border-right: 1.5px solid rgba(0,200,255,0.4); }

    @media (max-width: 600px) {
      body { padding: 10px; }
      .chat-wrap { height: 95vh; max-height: none; border-radius: 14px; }
      .msg { max-width: 88%; }
      .header-title { font-size: 14px; }
    }
  </style>
</head>
<body>

<div class="chat-wrap" id="chatWrap">
  <div class="scan-line"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Header -->
  <div class="chat-header">
    <div class="logo-ring">
      <div class="logo-inner"><i class="ti ti-topology-star"></i></div>
    </div>
    <div class="header-info">
      <div class="header-title">NexusChat <span style="font-size:11px;color:#3a6a80;font-weight:400;margin-left:6px">v2.0</span></div>
      <div class="header-sub">Flask + MySQL · 2-Tier Architecture</div>
    </div>
    <div class="status-pill">
      <div class="status-dot"></div>
      Live
    </div>
  </div>

  <!-- Messages -->
  <div class="chat-messages" id="msgBox">
    {% for message in messages %}
    <div class="msg bot">
      <div class="msg-row">
        <div class="msg-avatar"><i class="ti ti-robot"></i></div>
        <div class="msg-bubble">{{ message[0] }}</div>
      </div>
    </div>
    {% endfor %}
    {% if not messages %}
    <div class="msg bot">
      <div class="msg-row">
        <div class="msg-avatar"><i class="ti ti-robot"></i></div>
        <div class="msg-bubble">System online. NexusChat is ready. Messages persist to MySQL. Type something to begin.</div>
      </div>
    </div>
    {% endif %}
  </div>

  <div class="typing-indicator" id="typing">
    <div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div>
  </div>

  <!-- Input -->
  <div class="chat-input-area">
    <div class="input-shell">
      <textarea class="chat-textarea" id="msgInput" placeholder="Transmit message…" rows="1"></textarea>
      <button class="send-btn" id="sendBtn" aria-label="Send message">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div class="hint-bar">
      <span class="hint-pill" onclick="useHint(this)"><i class="ti ti-bolt" style="font-size:11px;margin-right:4px"></i>Hello there</span>
      <span class="hint-pill" onclick="useHint(this)"><i class="ti ti-help" style="font-size:11px;margin-right:4px"></i>How does this work?</span>
      <span class="hint-pill" onclick="useHint(this)"><i class="ti ti-flame" style="font-size:11px;margin-right:4px"></i>Show me a demo</span>
      <span class="hint-pill" onclick="useHint(this)"><i class="ti ti-test-pipe" style="font-size:11px;margin-right:4px"></i>Testing 123</span>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script>
  const msgBox = document.getElementById('msgBox');
  const input  = document.getElementById('msgInput');
  const typing = document.getElementById('typing');

  function getTime() {
    const n = new Date();
    return n.getHours().toString().padStart(2,'0') + ':' + n.getMinutes().toString().padStart(2,'0');
  }

  function appendMsg(text, role) {
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + role;
    const icon = role === 'user' ? 'ti-user' : 'ti-robot';
    wrap.innerHTML = `
      <div class="msg-row">
        <div class="msg-avatar"><i class="ti ${icon}"></i></div>
        <div class="msg-bubble">${escHtml(text)}</div>
      </div>
      <div class="msg-time">${getTime()}</div>
    `;
    msgBox.appendChild(wrap);
    msgBox.scrollTop = msgBox.scrollHeight;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showTyping() { typing.classList.add('show'); msgBox.scrollTop = msgBox.scrollHeight; }
  function hideTyping() { typing.classList.remove('show'); }

  function sendMessage() {
    const msg = input.value.trim();
    if (!msg) return;
    appendMsg(msg, 'user');
    input.value = '';
    input.style.height = 'auto';
    showTyping();

    $.ajax({
      url: '/submit',
      type: 'POST',
      data: { new_message: msg },
      success: function(response) {
        hideTyping();
        if (response && response.message) {
          appendMsg(response.message, 'bot');
        }
      },
      error: function() {
        hideTyping();
        appendMsg('Message delivered to server.', 'bot');
      }
    });
  }

  document.getElementById('sendBtn').onclick = sendMessage;

  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  input.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 110) + 'px';
  });

  function useHint(el) {
    input.value = el.textContent.trim();
    input.focus();
  }

  msgBox.scrollTop = msgBox.scrollHeight;
</script>
</body>
</html>
